{% extends "base.html" %}

{% block content %}
<h2>Список студентов</h2>

<style>
    .pass { 
        background-color: #90EE90;
        color: black;
    }
    .fail { 
        background-color: #FFB6C6;
        color: black;
    }
    table, th, td {
        border: 1px solid black;
        border-collapse: collapse;
        padding: 8px;
    }
    th {
        background-color: #4CAF50;
        color: white;
    }
</style>

<table>
    <tr>
        <th>Имя</th>
        <th>Возраст</th>
        <th>Оценка</th>
        <th>Статус</th>
    </tr>

    {% for s in students %}
    {% if s.grade >= threshold %}
        <tr class="pass">
            <td>{{ s.name }}</td>
            <td>{{ s.age }}</td>
            <td>{{ s.grade }}</td>
            <td>✓ Сдал</td>
        </tr>
    {% else %}
        <tr class="fail">
            <td>{{ s.name }}</td>
            <td>{{ s.age }}</td>
            <td>{{ s.grade }}</td>
            <td>✗ Не сдал</td>
        </tr>
    {% endif %}
    {% endfor %}
</table>

{% endblock %}
