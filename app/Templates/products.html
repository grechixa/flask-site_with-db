{% extends "base.html" %}

{% block content %}
<h2>Каталог товаров</h2>

<style>
    .expensive { 
        background-color: #FFB6C6;
        font-weight: bold;
    }
    .available {
        background-color: #90EE90;
    }
</style>

<ul>
    {% for p in products %}
        <li class="{% if p.price > threshold %}expensive{% endif %}">
            <strong>{{ p.name }}</strong> - ${{ p.price }} —
            {% if p.available %}
                <span class="available">✓ В наличии</span>
            {% else %}
                <span style="color: #FF6347;">⏳ Ожидается поступление</span>
            {% endif %}
        </li>
    {% endfor %}
</ul>

{% endblock %}
