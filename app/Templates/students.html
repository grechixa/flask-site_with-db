{% extends "base.html" %}

{% block content %}
<h2>Студенты</h2>

<p><a href="/students/add">+ Добавить нового студента</a></p>

<style>
    .pass { background-color: lightgreen; }
    .fail { background-color: lightcoral; }
    table, th, td { border: 1px solid black; border-collapse: collapse; padding: 5px; }
</style>

<table>
    <tr>
        <th>Имя</th>
        <th>Возраст</th>
        <th>Оценка</th>
        <th>Статус</th>
        <th>Действия</th>
    </tr>
    {% for s in students %}
    <tr class="{% if s.grade >= threshold %}pass{% else %}fail{% endif %}">
        <td>{{ s.name }}</td>
        <td>{{ s.age }}</td>
        <td>{{ s.grade }}</td>
        <td>{{ s.status }}</td>
        <td>
            <a href="/students/edit/{{ s.id }}">Редактировать</a>
            &nbsp;|&nbsp;
            <form action="/students/delete/{{ s.id }}" method="post" style="display:inline;">
                <button type="submit" onclick="return confirm('Удалить студента?');">Удалить</button>
            </form>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
