{% extends "base.html" %}

{% block content %}
<h2>Добавить новый пост</h2>

<form method="POST">
    <label>Заголовок:</label><br>
    <input type="text" name="title" required style="width: 300px; padding: 5px;"><br><br>
    
    <label>Текст:</label><br>
    <textarea name="content" required style="width: 500px; height: 200px; padding: 5px;"></textarea><br><br>
    
    <button type="submit">Сохранить пост</button>
    <a href="/posts">Отмена</a>
</form>

{% endblock %}
