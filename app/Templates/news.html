{% extends "base.html" %}

{% block content %}
<h2>Новости</h2>

<ul>
    {% for item in news %}
        <li>
            <strong>{{ item.title }}</strong> - {{ item.views }} просмотров
            {% if item.views > 1000 %}
                (Популярное)
            {% endif %}
        </li>
    {% endfor %}
</ul>

{% endblock %}
