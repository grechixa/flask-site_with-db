{% extends "base.html" %}

{% block content %}
<h2>Товары</h2>

<style>
    .expensive { color: red; }
</style>

<ul>
    {% for p in products %}
        <li class="{% if p.price > threshold %}expensive{% endif %}">
            {{ p.name }} - ${{ p.price }} -
            {% if p.available %}
                В наличии
            {% else %}
                Ожидается поступление
            {% endif %}
        </li>
    {% endfor %}
</ul>

{% endblock %}
